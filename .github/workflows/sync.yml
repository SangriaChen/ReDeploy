name: Sync ygkkk/argosbx to GHCR

on:
  workflow_dispatch:

env:
  SOURCE_IMAGE: ygkkk/argosbx
  TARGET_NAME: redp-img    # 你可以改成你想要的镜像名（全小写）

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert owner to lowercase
        run: echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Pull source image
        run: docker pull ${{ env.SOURCE_IMAGE }}

      - name: Retag for GHCR
        run: |
          TARGET_IMAGE="ghcr.io/${{ env.OWNER_LC }}/${{ env.TARGET_NAME }}:latest"
          docker tag ${{ env.SOURCE_IMAGE }} $TARGET_IMAGE
          echo "New image: $TARGET_IMAGE"

      - name: Push to GHCR
        run: |
          TARGET_IMAGE="ghcr.io/${{ env.OWNER_LC }}/${{ env.TARGET_NAME }}:latest"
          docker push $TARGET_IMAGE
